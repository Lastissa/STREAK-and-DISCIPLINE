{% if messages %}
<div class="messages-container" id="messagesContainer">
    <button class="msg-copy-all" id="msgCopyAll" title="Copy all messages">
        <i class="fas fa-copy"></i> <span>Copy</span>
    </button>
    {% for message in messages %}
    <div class="msg msg-{{ message.tags }}" role="alert">
        <span class="msg-icon">
            {% if message.tags == 'success' %}<i class="fas fa-check-circle"></i>
            {% elif message.tags == 'error' %}<i class="fas fa-times-circle"></i>
            {% elif message.tags == 'warning' %}<i class="fas fa-exclamation-triangle"></i>
            {% elif message.tags == 'info' %}<i class="fas fa-info-circle"></i>
            {% else %}<i class="fas fa-bell"></i>
            {% endif %}
        </span>
        <span class="msg-text">{{ message }}</span>
        <button class="msg-close" aria-label="Dismiss message">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}
