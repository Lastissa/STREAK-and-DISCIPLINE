{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Progress — STREAK & DISCIPLINE</title>
    <link rel="stylesheet" href="{{ font_awesome_all_min_css }}">
    <style>
        :root{--bg:#0a0e17;--text:#e2e8f0;--text-secondary:#94a3b8;--accent:#3b82f6;--accent-light:#60a5fa;--border:#1e293b;--font-sans:system-ui,sans-serif;--radius:12px;--max-width:1100px}
        body.light-mode{--bg:#f8fafc;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        .site-header{position:fixed;top:12px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:calc(var(--max-width) - 24px);z-index:100;border-radius:16px;background:rgba(10,14,23,0.78);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 32px rgba(0,0,0,0.3);display:flex;justify-content:space-between;align-items:center;padding:0.5rem 1rem}
        body.light-mode .site-header{background:rgba(248,250,252,0.85);border-color:rgba(0,0,0,0.06)}
        .logo-link{display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--text)}
        .logo-img{width:32px;height:32px;border-radius:8px}
        .logo-text{font-size:0.9rem;font-weight:700;color:var(--accent-light)}
        .nav-links{display:flex;gap:0.3rem}
        .nav-links a{color:var(--text-secondary);text-decoration:none;font-weight:500;padding:0.35rem 0.6rem;border-radius:8px;font-size:0.78rem}
        .nav-links a:hover{color:#fff;background:rgba(255,255,255,0.04)}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
        .card{text-align:center}
        .card svg{width:48px;height:48px;margin-bottom:0.8rem}
        .card h1{font-size:1.2rem;margin-bottom:0.3rem}
        .card p{color:var(--text-secondary);font-size:0.85rem}
        .card a{display:inline-block;margin-top:1rem;padding:0.5rem 1.2rem;background:var(--accent);color:#fff;border-radius:var(--radius);text-decoration:none;font-weight:600;font-size:0.82rem}
        @media(max-width:639px){.logo-text{display:none}}
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="logo-link">
            <img src="{{ logo_url }}" alt="Logo" class="logo-img" width="32" height="32">
            <span class="logo-text">STREAK & DISCIPLINE</span>
        </a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="{% url 'origin_extra' %}#privacy">Privacy</a>
            <a href="{% url 'origin_extra' %}#help">Help</a>
        </nav>
    </header>
    <main>
        <div class="card">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <h1>Still in Progress</h1>
            <p>This page isn't ready yet. Check back soon.</p>
            <a href="/">← Back to Home</a>
        </div>
    </main>
    <script>
        (function(){var c=document.cookie.match('(^|;)\\s*sd-theme\\s*=\\s*([^;]+)');if(c&&c.pop()==='light')document.body.classList.add('light-mode')})();
    </script>
</body>
</html>
